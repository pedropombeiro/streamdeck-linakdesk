name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (for example v0.1.0.20)'
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  publish:
    name: Publish release artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3

      - name: Install project tools
        run: mise install

      - name: Build release artifact
        run: mise run release

      - name: Write release version file
        run: |
          printf '%s\n' "${RELEASE_TAG}" > Release/VERSION.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            Release/com.pedropombeiro.streamdeck-linakdesk.streamDeckPlugin
            Release/VERSION.txt
          generate_release_notes: true
